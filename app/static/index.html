<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passos Mágicos - Assistente Pedagógico</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        .scrollbar-thin::-webkit-scrollbar { width: 6px; }
        .scrollbar-thin::-webkit-scrollbar-track { background: #DFE9F5; }
        .scrollbar-thin::-webkit-scrollbar-thumb { background: #001A5F; border-radius: 3px; }
        .typing-dot { animation: typing 1.4s infinite; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-4px); }
        }
        .message-enter { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'pm-light': '#DFE9F5',
                        'pm-dark': '#001A5F',
                        'pm-orange': '#D38030',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-pm-light min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        // Ícones SVG
        const SendIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
        );

        const BotIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M12 8V4H8"></path>
                <rect width="16" height="12" x="4" y="8" rx="2"></rect>
                <path d="M2 14h2"></path>
                <path d="M20 14h2"></path>
                <path d="M15 13v2"></path>
                <path d="M9 13v2"></path>
            </svg>
        );

        const UserIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
            </svg>
        );

        const CodeIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="16 18 22 12 16 6"></polyline>
                <polyline points="8 6 2 12 8 18"></polyline>
            </svg>
        );

        // Componente de Loading (typing indicator)
        const TypingIndicator = () => (
            <div className="flex items-center space-x-1 px-4 py-2">
                <div className="typing-dot w-2 h-2 bg-pm-dark rounded-full"></div>
                <div className="typing-dot w-2 h-2 bg-pm-dark rounded-full"></div>
                <div className="typing-dot w-2 h-2 bg-pm-dark rounded-full"></div>
            </div>
        );

        // Componente de Mensagem
        const Message = ({ message, isUser, sql }) => {
            const [showSql, setShowSql] = useState(false);

            return (
                <div className={`message-enter flex ${isUser ? 'justify-end' : 'justify-start'} mb-4`}>
                    <div className={`flex items-start max-w-[80%] ${isUser ? 'flex-row-reverse' : 'flex-row'}`}>
                        {/* Avatar */}
                        <div className={`flex-shrink-0 w-10 h-10 rounded-full flex items-center justify-center ${
                            isUser ? 'bg-pm-orange ml-3' : 'bg-pm-dark mr-3'
                        }`}>
                            {isUser ? (
                                <span className="text-white"><UserIcon /></span>
                            ) : (
                                <span className="text-white"><BotIcon /></span>
                            )}
                        </div>

                        {/* Conteúdo */}
                        <div>
                            <div className={`rounded-2xl px-4 py-3 ${
                                isUser 
                                    ? 'bg-pm-orange text-white rounded-tr-sm' 
                                    : 'bg-white text-gray-800 rounded-tl-sm shadow-sm'
                            }`}>
                                <p className="whitespace-pre-wrap text-sm leading-relaxed">{message}</p>
                            </div>

                            {/* Botão SQL */}
                            {sql && !isUser && (
                                <div className="mt-2">
                                    <button 
                                        onClick={() => setShowSql(!showSql)}
                                        className="flex items-center space-x-1 text-xs text-pm-dark hover:text-pm-orange transition-colors"
                                    >
                                        <CodeIcon />
                                        <span>{showSql ? 'Ocultar SQL' : 'Ver SQL'}</span>
                                    </button>
                                    {showSql && (
                                        <pre className="mt-2 p-3 bg-pm-dark text-green-400 rounded-lg text-xs overflow-x-auto">
                                            {sql}
                                        </pre>
                                    )}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // Componente de Sugestão
        const Suggestion = ({ text, onClick }) => (
            <button
                onClick={onClick}
                className="px-4 py-2 bg-white text-pm-dark text-sm rounded-full border-2 border-pm-dark hover:bg-pm-dark hover:text-white transition-all duration-200 shadow-sm"
            >
                {text}
            </button>
        );

        // Componente Principal
        const App = () => {
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [suggestions, setSuggestions] = useState([]);
            const messagesEndRef = useRef(null);
            const inputRef = useRef(null);

            // Scroll para última mensagem
            const scrollToBottom = () => {
                messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            };

            useEffect(() => {
                scrollToBottom();
            }, [messages, isLoading]);

            // Carregar sugestões
            useEffect(() => {
                fetch('/chat/suggestions')
                    .then(res => res.json())
                    .then(data => setSuggestions(data.sugestoes?.slice(0, 4) || []))
                    .catch(() => setSuggestions([
                        "Quantos alunos temos em cada perfil?",
                        "Quais alunos estão no perfil Crítico?",
                        "Qual a média de IAA por turma?",
                        "Liste os alunos Destaque"
                    ]));
            }, []);

            // Enviar mensagem
            const sendMessage = async (text) => {
                if (!text.trim() || isLoading) return;

                const userMessage = { text: text.trim(), isUser: true };
                setMessages(prev => [...prev, userMessage]);
                setInput('');
                setIsLoading(true);

                try {
                    const response = await fetch('/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ pergunta: text.trim() })
                    });

                    const data = await response.json();

                    const botMessage = {
                        text: data.resposta || 'Desculpe, não consegui processar sua pergunta.',
                        isUser: false,
                        sql: data.sql_utilizado
                    };

                    setMessages(prev => [...prev, botMessage]);
                } catch (error) {
                    setMessages(prev => [...prev, {
                        text: 'Erro ao conectar com o servidor. Tente novamente.',
                        isUser: false
                    }]);
                } finally {
                    setIsLoading(false);
                    inputRef.current?.focus();
                }
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                sendMessage(input);
            };

            const handleSuggestionClick = (suggestion) => {
                sendMessage(suggestion);
            };

            return (
                <div className="flex flex-col h-screen max-w-4xl mx-auto">
                    {/* Header */}
                    <header className="bg-pm-dark text-white p-4 shadow-lg">
                        <div className="flex items-center space-x-3">
                            <div className="w-12 h-12 bg-pm-orange rounded-full flex items-center justify-center">
                                <span className="text-2xl">🎓</span>
                            </div>
                            <div>
                                <h1 className="text-xl font-bold">Passos Mágicos</h1>
                                <p className="text-sm text-gray-300">Assistente Pedagógico</p>
                            </div>
                        </div>
                    </header>

                    {/* Chat Area */}
                    <main className="flex-1 overflow-y-auto p-4 scrollbar-thin">
                        {messages.length === 0 ? (
                            <div className="flex flex-col items-center justify-center h-full text-center">
                                <div className="w-20 h-20 bg-pm-dark rounded-full flex items-center justify-center mb-4">
                                    <span className="text-4xl">🎓</span>
                                </div>
                                <h2 className="text-xl font-semibold text-pm-dark mb-2">
                                    Olá! Como posso ajudar?
                                </h2>
                                <p className="text-gray-600 mb-6 max-w-md">
                                    Sou o assistente pedagógico da Associação Passos Mágicos. 
                                    Posso ajudar você a consultar informações sobre os alunos.
                                </p>

                                {/* Sugestões */}
                                <div className="flex flex-wrap justify-center gap-2 max-w-lg">
                                    {suggestions.map((suggestion, index) => (
                                        <Suggestion 
                                            key={index} 
                                            text={suggestion} 
                                            onClick={() => handleSuggestionClick(suggestion)}
                                        />
                                    ))}
                                </div>
                            </div>
                        ) : (
                            <>
                                {messages.map((msg, index) => (
                                    <Message 
                                        key={index} 
                                        message={msg.text} 
                                        isUser={msg.isUser}
                                        sql={msg.sql}
                                    />
                                ))}
                                {isLoading && (
                                    <div className="flex justify-start mb-4">
                                        <div className="flex items-start">
                                            <div className="flex-shrink-0 w-10 h-10 rounded-full bg-pm-dark flex items-center justify-center mr-3">
                                                <span className="text-white"><BotIcon /></span>
                                            </div>
                                            <div className="bg-white rounded-2xl rounded-tl-sm shadow-sm">
                                                <TypingIndicator />
                                            </div>
                                        </div>
                                    </div>
                                )}
                                <div ref={messagesEndRef} />
                            </>
                        )}
                    </main>

                    {/* Input Area */}
                    <footer className="bg-white border-t border-gray-200 p-4">
                        <form onSubmit={handleSubmit} className="flex space-x-3">
                            <input
                                ref={inputRef}
                                type="text"
                                value={input}
                                onChange={(e) => setInput(e.target.value)}
                                placeholder="Digite sua pergunta..."
                                disabled={isLoading}
                                className="flex-1 px-4 py-3 bg-pm-light border-2 border-transparent rounded-full focus:outline-none focus:border-pm-dark transition-colors disabled:opacity-50"
                            />
                            <button
                                type="submit"
                                disabled={!input.trim() || isLoading}
                                className="w-12 h-12 bg-pm-orange text-white rounded-full flex items-center justify-center hover:bg-opacity-90 transition-all disabled:opacity-50 disabled:cursor-not-allowed"
                            >
                                <SendIcon />
                            </button>
                        </form>
                        <p className="text-center text-xs text-gray-400 mt-2">
                            Passos Mágicos © 2024 - Transformando vidas através da educação
                        </p>
                    </footer>
                </div>
            );
        };

        // Render
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
