<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passos Mágicos - Assistente Pedagógico</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        .scrollbar-thin::-webkit-scrollbar { width: 6px; }
        .scrollbar-thin::-webkit-scrollbar-track { background: #DFE9F5; }
        .scrollbar-thin::-webkit-scrollbar-thumb { background: #001A5F; border-radius: 3px; }
        .typing-dot { animation: typing 1.4s infinite; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-4px); }
        }
        .message-enter { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'pm-light': '#DFE9F5',
                        'pm-dark': '#001A5F',
                        'pm-orange': '#D38030',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-pm-light min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        // Ícones SVG
        const SendIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
        );

        const BotIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M12 8V4H8"></path>
                <rect width="16" height="12" x="4" y="8" rx="2"></rect>
                <path d="M2 14h2"></path>
                <path d="M20 14h2"></path>
                <path d="M15 13v2"></path>
                <path d="M9 13v2"></path>
            </svg>
        );

        const UserIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
            </svg>
        );

        const CodeIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="16 18 22 12 16 6"></polyline>
                <polyline points="8 6 2 12 8 18"></polyline>
            </svg>
        );

        const ChatIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
            </svg>
        );

        const ChartIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <line x1="18" y1="20" x2="18" y2="10"></line>
                <line x1="12" y1="20" x2="12" y2="4"></line>
                <line x1="6" y1="20" x2="6" y2="14"></line>
            </svg>
        );

        const RefreshIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="23 4 23 10 17 10"></polyline>
                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
            </svg>
        );

        // Componentes do Chat
        const TypingIndicator = () => (
            <div className="flex items-center space-x-1 px-4 py-2">
                <div className="typing-dot w-2 h-2 bg-pm-dark rounded-full"></div>
                <div className="typing-dot w-2 h-2 bg-pm-dark rounded-full"></div>
                <div className="typing-dot w-2 h-2 bg-pm-dark rounded-full"></div>
            </div>
        );

        const Message = ({ message, isUser, sql }) => {
            const [showSql, setShowSql] = useState(false);
            return (
                <div className={`message-enter flex ${isUser ? 'justify-end' : 'justify-start'} mb-4`}>
                    <div className={`flex items-start max-w-[80%] ${isUser ? 'flex-row-reverse' : 'flex-row'}`}>
                        <div className={`flex-shrink-0 w-10 h-10 rounded-full flex items-center justify-center ${isUser ? 'bg-pm-orange ml-3' : 'bg-pm-dark mr-3'}`}>
                            {isUser ? <span className="text-white"><UserIcon /></span> : <span className="text-white"><BotIcon /></span>}
                        </div>
                        <div>
                            <div className={`rounded-2xl px-4 py-3 ${isUser ? 'bg-pm-orange text-white rounded-tr-sm' : 'bg-white text-gray-800 rounded-tl-sm shadow-sm'}`}>
                                <p className="whitespace-pre-wrap text-sm leading-relaxed">{message}</p>
                            </div>
                            {sql && !isUser && (
                                <div className="mt-2">
                                    <button onClick={() => setShowSql(!showSql)} className="flex items-center space-x-1 text-xs text-pm-dark hover:text-pm-orange transition-colors">
                                        <CodeIcon /><span>{showSql ? 'Ocultar SQL' : 'Ver SQL'}</span>
                                    </button>
                                    {showSql && <pre className="mt-2 p-3 bg-pm-dark text-green-400 rounded-lg text-xs overflow-x-auto">{sql}</pre>}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const Suggestion = ({ text, onClick }) => (
            <button onClick={onClick} className="px-4 py-2 bg-white text-pm-dark text-sm rounded-full border-2 border-pm-dark hover:bg-pm-dark hover:text-white transition-all duration-200 shadow-sm">{text}</button>
        );

        // Página de Chat
        const ChatPage = () => {
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [suggestions, setSuggestions] = useState([]);
            const messagesEndRef = useRef(null);
            const inputRef = useRef(null);

            useEffect(() => { messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages, isLoading]);

            useEffect(() => {
                fetch('/chat/suggestions').then(res => res.json()).then(data => setSuggestions(data.sugestoes?.slice(0, 4) || []))
                    .catch(() => setSuggestions(["Quantos alunos temos em cada perfil?", "Quais alunos estão no perfil Crítico?"]));
            }, []);

            const sendMessage = async (text) => {
                if (!text.trim() || isLoading) return;
                setMessages(prev => [...prev, { text: text.trim(), isUser: true }]);
                setInput('');
                setIsLoading(true);
                try {
                    const response = await fetch('/chat', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ pergunta: text.trim() }) });
                    const data = await response.json();
                    setMessages(prev => [...prev, { text: data.resposta || 'Erro ao processar.', isUser: false, sql: data.sql_utilizado }]);
                } catch { setMessages(prev => [...prev, { text: 'Erro de conexão.', isUser: false }]); }
                finally { setIsLoading(false); inputRef.current?.focus(); }
            };

            return (
                <div className="flex flex-col h-full">
                    <main className="flex-1 overflow-y-auto p-4 scrollbar-thin">
                        {messages.length === 0 ? (
                            <div className="flex flex-col items-center justify-center h-full text-center">
                                <div className="w-20 h-20 bg-pm-dark rounded-full flex items-center justify-center mb-4"><span className="text-4xl">🎓</span></div>
                                <h2 className="text-xl font-semibold text-pm-dark mb-2">Olá! Como posso ajudar?</h2>
                                <p className="text-gray-600 mb-6 max-w-md">Sou o assistente pedagógico da Associação Passos Mágicos.</p>
                                <div className="flex flex-wrap justify-center gap-2 max-w-lg">
                                    {suggestions.map((s, i) => <Suggestion key={i} text={s} onClick={() => sendMessage(s)} />)}
                                </div>
                            </div>
                        ) : (
                            <>
                                {messages.map((msg, i) => <Message key={i} message={msg.text} isUser={msg.isUser} sql={msg.sql} />)}
                                {isLoading && <div className="flex justify-start mb-4"><div className="flex items-start"><div className="flex-shrink-0 w-10 h-10 rounded-full bg-pm-dark flex items-center justify-center mr-3"><span className="text-white"><BotIcon /></span></div><div className="bg-white rounded-2xl rounded-tl-sm shadow-sm"><TypingIndicator /></div></div></div>}
                                <div ref={messagesEndRef} />
                            </>
                        )}
                    </main>
                    <footer className="bg-white border-t border-gray-200 p-4">
                        <form onSubmit={(e) => { e.preventDefault(); sendMessage(input); }} className="flex space-x-3">
                            <input ref={inputRef} type="text" value={input} onChange={(e) => setInput(e.target.value)} placeholder="Digite sua pergunta..." disabled={isLoading} className="flex-1 px-4 py-3 bg-pm-light border-2 border-transparent rounded-full focus:outline-none focus:border-pm-dark transition-colors disabled:opacity-50" />
                            <button type="submit" disabled={!input.trim() || isLoading} className="w-12 h-12 bg-pm-orange text-white rounded-full flex items-center justify-center hover:bg-opacity-90 transition-all disabled:opacity-50 disabled:cursor-not-allowed"><SendIcon /></button>
                        </form>
                    </footer>
                </div>
            );
        };

        // Barra de Drift
        const DriftBar = ({ feature, refMean, curMean, diffPct, psi, hasDrift, severity }) => {
            const maxVal = Math.max(refMean, curMean) * 1.2;
            const refWidth = (refMean / maxVal) * 100;
            const curWidth = (curMean / maxVal) * 100;
            const colors = { low: 'bg-green-500', medium: 'bg-yellow-500', high: 'bg-red-500' };

            return (
                <div className="bg-white rounded-lg p-4 shadow-sm mb-3">
                    <div className="flex justify-between items-center mb-2">
                        <div className="flex items-center space-x-2">
                            <span className="font-semibold text-pm-dark">{feature}</span>
                            {hasDrift && <span className={`px-2 py-0.5 text-xs rounded-full text-white ${colors[severity]}`}>{severity === 'high' ? '⚠️ Alto' : severity === 'medium' ? '⚡ Médio' : '✓ Baixo'}</span>}
                        </div>
                        <span className="text-sm text-gray-500">PSI: {psi.toFixed(3)} | Diff: {diffPct.toFixed(1)}%</span>
                    </div>
                    <div className="space-y-2">
                        <div className="flex items-center space-x-2">
                            <span className="text-xs text-gray-500 w-16">Treino:</span>
                            <div className="flex-1 bg-gray-200 rounded-full h-4">
                                <div className="bg-pm-dark h-4 rounded-full flex items-center justify-end pr-2" style={{ width: `${refWidth}%` }}>
                                    <span className="text-xs text-white font-medium">{refMean.toFixed(2)}</span>
                                </div>
                            </div>
                        </div>
                        <div className="flex items-center space-x-2">
                            <span className="text-xs text-gray-500 w-16">Atual:</span>
                            <div className="flex-1 bg-gray-200 rounded-full h-4">
                                <div className={`h-4 rounded-full flex items-center justify-end pr-2 ${hasDrift ? colors[severity] : 'bg-pm-orange'}`} style={{ width: `${curWidth}%` }}>
                                    <span className="text-xs text-white font-medium">{curMean.toFixed(2)}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // Página de Monitoramento
        const MonitoringPage = () => {
            const [driftData, setDriftData] = useState(null);
            const [loading, setLoading] = useState(true);
            const [selectedPeriod, setSelectedPeriod] = useState('PEDE2024');
            const [error, setError] = useState(null);

            const fetchDrift = async (period) => {
                setLoading(true);
                setError(null);
                try {
                    const response = await fetch(`/monitoring/drift?comparison=${period}`);
                    if (!response.ok) throw new Error('Erro ao carregar dados');
                    setDriftData(await response.json());
                } catch (err) { setError(err.message); }
                finally { setLoading(false); }
            };

            useEffect(() => { fetchDrift(selectedPeriod); }, [selectedPeriod]);

            if (loading) return <div className="flex items-center justify-center h-full"><div className="text-center"><div className="animate-spin rounded-full h-12 w-12 border-b-2 border-pm-dark mx-auto mb-4"></div><p className="text-gray-600">Analisando drift...</p></div></div>;
            if (error) return <div className="flex items-center justify-center h-full"><div className="text-center text-red-500"><p className="text-xl mb-2">❌</p><p>{error}</p><button onClick={() => fetchDrift(selectedPeriod)} className="mt-4 px-4 py-2 bg-pm-dark text-white rounded-lg">Tentar novamente</button></div></div>;

            return (
                <div className="h-full overflow-y-auto p-4 scrollbar-thin">
                    {/* Header */}
                    <div className="bg-white rounded-lg p-4 shadow-sm mb-4">
                        <div className="flex justify-between items-center">
                            <div>
                                <h2 className="text-lg font-bold text-pm-dark">Monitoramento de Drift</h2>
                                <p className="text-sm text-gray-500">Comparando {driftData.reference_period} → {driftData.comparison_period}</p>
                            </div>
                            <div className="flex items-center space-x-2">
                                <select value={selectedPeriod} onChange={(e) => setSelectedPeriod(e.target.value)} className="px-3 py-2 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-pm-dark">
                                    <option value="PEDE2023">PEDE 2023</option>
                                    <option value="PEDE2024">PEDE 2024</option>
                                </select>
                                <button onClick={() => fetchDrift(selectedPeriod)} className="p-2 bg-pm-dark text-white rounded-lg hover:bg-opacity-90"><RefreshIcon /></button>
                            </div>
                        </div>
                    </div>

                    {/* Status */}
                    <div className={`rounded-lg p-4 shadow-sm mb-4 ${driftData.overall_drift ? 'bg-red-50 border-l-4 border-red-500' : 'bg-green-50 border-l-4 border-green-500'}`}>
                        <div className="flex items-center justify-between">
                            <div>
                                <p className="font-semibold text-lg">{driftData.overall_drift ? '⚠️ Drift Detectado' : '✅ Modelo Estável'}</p>
                                <p className="text-sm text-gray-600 mt-1">{driftData.recommendation}</p>
                            </div>
                            <div className="text-right">
                                <p className="text-2xl font-bold text-pm-dark">{driftData.features_with_drift}/{driftData.features_analyzed}</p>
                                <p className="text-xs text-gray-500">features com drift</p>
                            </div>
                        </div>
                    </div>

                    {/* Samples */}
                    <div className="grid grid-cols-2 gap-4 mb-4">
                        <div className="bg-white rounded-lg p-4 shadow-sm text-center">
                            <p className="text-2xl font-bold text-pm-dark">{driftData.reference_samples}</p>
                            <p className="text-sm text-gray-500">Amostras Treino (2022)</p>
                        </div>
                        <div className="bg-white rounded-lg p-4 shadow-sm text-center">
                            <p className="text-2xl font-bold text-pm-orange">{driftData.comparison_samples}</p>
                            <p className="text-sm text-gray-500">Amostras Atuais</p>
                        </div>
                    </div>

                    {/* Features */}
                    <h3 className="font-semibold text-pm-dark mb-3">Detalhes por Feature</h3>
                    {driftData.feature_details.map((f, i) => (
                        <DriftBar key={i} feature={f.feature} refMean={f.reference_mean} curMean={f.current_mean} diffPct={f.mean_diff_pct} psi={f.psi} hasDrift={f.has_drift} severity={f.severity} />
                    ))}

                    {/* Legenda */}
                    <div className="bg-white rounded-lg p-4 shadow-sm mt-4">
                        <h4 className="font-semibold text-sm text-pm-dark mb-2">Legenda</h4>
                        <div className="grid grid-cols-2 gap-2 text-xs text-gray-600">
                            <div><span className="font-medium">PSI</span>: Population Stability Index</div>
                            <div>PSI &lt; 0.1 = Estável</div>
                            <div>PSI 0.1-0.2 = Mudança moderada</div>
                            <div>PSI &gt; 0.2 = Drift significativo</div>
                        </div>
                    </div>
                </div>
            );
        };

        // App Principal
        const App = () => {
            const [currentPage, setCurrentPage] = useState('chat');

            return (
                <div className="flex flex-col h-screen max-w-4xl mx-auto">
                    <header className="bg-pm-dark text-white p-4 shadow-lg">
                        <div className="flex items-center justify-between">
                            <div className="flex items-center space-x-3">
                                <div className="w-12 h-12 bg-pm-orange rounded-full flex items-center justify-center"><span className="text-2xl">🎓</span></div>
                                <div>
                                    <h1 className="text-xl font-bold">Passos Mágicos</h1>
                                    <p className="text-sm text-gray-300">Assistente Pedagógico</p>
                                </div>
                            </div>
                            <nav className="flex space-x-1">
                                <button onClick={() => setCurrentPage('chat')} className={`flex items-center space-x-2 px-4 py-2 rounded-lg transition-colors ${currentPage === 'chat' ? 'bg-pm-orange text-white' : 'text-gray-300 hover:bg-white/10'}`}>
                                    <ChatIcon /><span className="hidden sm:inline">Chat</span>
                                </button>
                                <button onClick={() => setCurrentPage('monitoring')} className={`flex items-center space-x-2 px-4 py-2 rounded-lg transition-colors ${currentPage === 'monitoring' ? 'bg-pm-orange text-white' : 'text-gray-300 hover:bg-white/10'}`}>
                                    <ChartIcon /><span className="hidden sm:inline">Monitoramento</span>
                                </button>
                            </nav>
                        </div>
                    </header>
                    <main className="flex-1 overflow-hidden">
                        {currentPage === 'chat' ? <ChatPage /> : <MonitoringPage />}
                    </main>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
