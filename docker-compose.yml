# docker-compose.yml
# Projeto Passos Mágicos - API + Frontend React

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: passos-magicos
    ports:
      - "8000:8000"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - DB_PATH=/app/data/passos_magicos.db
      - PYTHONPATH=/app
    volumes:
      - ./data:/app/data
      - ./app/models:/app/app/models
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped